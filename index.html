<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程问题可视化 v3.0 - 三模块完整版</title>
  <style>
    /* ============================================
       Notion 风格设计系统
       ============================================ */

    :root {
      --bg-primary: #F7F6F3;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #EFEBE9;
      --bg-hover: #E9E5E2;

      --text-primary: #37352F;
      --text-secondary: #787774;
      --text-tertiary: #9B9A97;

      --accent-brown: #C28B5D;
      --accent-orange: #E78F75;
      --accent-green: #5FB789;
      --accent-blue: #5E8AD2;
      --accent-red: #E03E3E;

      --border-light: #E9E5E2;
      --border-medium: #D3D1CB;
      --border-dark: #B8B6B1;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 16px rgba(0,0,0,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 24px;
    }

    .header h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .header p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* Tab 切换 */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .tab {
      padding: 12px 28px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab:hover {
      background: var(--bg-hover);
      border-color: var(--accent-brown);
      transform: translateY(-1px);
    }

    .tab.active {
      background: var(--accent-brown);
      color: white;
      border-color: var(--accent-brown);
      box-shadow: var(--shadow-sm);
    }

    .tab-icon {
      font-size: 18px;
    }

    /* 模块容器 */
    .module-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      min-height: 800px;
    }

    .module-iframe {
      width: 100%;
      height: 900px;
      border: none;
      display: block;
    }

    .module-hidden {
      display: none;
    }

    /* 页脚 */
    .footer {
      margin-top: 40px;
      padding: 24px 0;
      border-top: 1px solid var(--border-light);
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .footer a {
      color: var(--accent-brown);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* 帮助提示 */
    .help-tip {
      background: var(--bg-tertiary);
      border-left: 4px solid var(--accent-brown);
      padding: 16px 20px;
      margin-bottom: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .help-tip-icon {
      font-size: 24px;
    }

    .help-tip-content h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .help-tip-content p {
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>行程问题可视化 v3.0</h1>
      <p>Math Motion Problem Visualizer • 三模块完整版</p>
    </div>

    <!-- Tab 切换 -->
    <div class="tabs">
      <div class="tab active" data-module="module1" onclick="switchTab('module1')">
        <span class="tab-icon">↔️</span>
        <span>直线往返相遇</span>
      </div>
      <div class="tab" data-module="module2" onclick="switchTab('module2')">
        <span class="tab-icon">➡️</span>
        <span>直线单次追及</span>
      </div>
      <div class="tab" data-module="module3" onclick="switchTab('module3')">
        <span class="tab-icon">⭕</span>
        <span>环形多次相遇/追及</span>
      </div>
    </div>

    <!-- 帮助提示 -->
    <div class="help-tip">
      <div class="help-tip-icon">💡</div>
      <div class="help-tip-content">
        <h4 id="helpTitle">模块1: 直线往返相遇问题</h4>
        <p id="helpDesc">展示甲乙在直线上往返运动的过程,每次折返轨迹自动下移,清晰显示累积路程。验证公式: 两端出发 (2n-1)S, 同端出发 2nS</p>
      </div>
    </div>

    <!-- 模块容器 -->
    <div class="module-container">
      <iframe
        id="module1"
        class="module-iframe"
        src="模块1-直线往返相遇.html"
        scrolling="yes">
      </iframe>
      <iframe
        id="module2"
        class="module-iframe module-hidden"
        src="模块2-直线单次追及.html"
        scrolling="yes">
      </iframe>
      <iframe
        id="module3"
        class="module-iframe module-hidden"
        src="模块3-环形多次相遇追及.html"
        scrolling="yes">
      </iframe>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <p>
        行程问题可视化工具 v3.0 • 基于 HTML + Canvas 开发
      </p>
      <p style="margin-top: 8px">
        <a href="https://github.com/boing1002/math-motion-visualizer" target="_blank">
          GitHub 仓库
        </a>
        •
        <a href="#" onclick="showAbout(); return false;">
          关于本工具
        </a>
      </p>
    </div>
  </div>

  <script>
    // 模块信息
    const moduleInfo = {
      module1: {
        title: '模块1: 直线往返相遇问题',
        desc: '展示甲乙在直线上往返运动的过程,每次折返轨迹自动下移,清晰显示累积路程。验证公式: 两端出发 (2n-1)S, 同端出发 2nS'
      },
      module2: {
        title: '模块2: 直线单次追及问题',
        desc: '使用平行跑道展示追及过程,甲在上跑道(速度快),乙在下跑道(速度慢)。清晰显示初始差距、追赶过程和追上时刻。验证公式: 甲路程 = 初始差距 + 乙路程'
      },
      module3: {
        title: '模块3: 环形多次相遇/追及问题',
        desc: '双屏联动展示环形运动:左侧圆形跑道显示实时位置,右侧条形图显示累积圈数。支持相向而行(相遇)和同向而行(追及)两种模式。验证公式: n次相遇=n圈, n次追及=n圈差'
      }
    };

    // 当前激活的模块
    let currentModule = 'module1';

    // 切换 Tab
    function switchTab(moduleId) {
      // 更新 Tab 样式
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`[data-module="${moduleId}"]`).classList.add('active');

      // 切换 iframe 显示
      document.querySelectorAll('.module-iframe').forEach(iframe => {
        iframe.classList.add('module-hidden');
      });
      document.getElementById(moduleId).classList.remove('module-hidden');

      // 更新帮助提示
      document.getElementById('helpTitle').textContent = moduleInfo[moduleId].title;
      document.getElementById('helpDesc').textContent = moduleInfo[moduleId].desc;

      // 更新当前模块
      currentModule = moduleId;

      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 显示关于信息
    function showAbout() {
      const aboutText = `
行程问题可视化工具 v3.0
========================

本工具用于辅助数学教学,通过可视化动画帮助理解行程问题。

包含三个模块:
1. 直线往返相遇问题 - 展示往返运动和公式验证
2. 直线单次追及问题 - 展示追及过程
3. 环形多次相遇/追及问题 - 双屏联动展示环形运动

技术特点:
• 纯 HTML + Canvas 实现,无需安装
• Notion 风格设计,界面简洁优雅
• 实时动画,自动暂停关键时刻
• 公式验证,帮助理解数学规律

开发者: Claude Code
版本: v3.0
GitHub: https://github.com/boing1002/math-motion-visualizer
      `;

      alert(aboutText);
    }

    // 页面加载完成
    window.addEventListener('load', () => {
      console.log('行程问题可视化工具 v3.0 已加载');
      console.log('当前模块:', currentModule);
    });
  </script>
</body>
</html>
